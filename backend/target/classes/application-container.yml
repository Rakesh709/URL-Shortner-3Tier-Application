spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/urlshortener
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8080
  forward-headers-strategy: native

logging:
  level:
    com.urlshortner: INFO